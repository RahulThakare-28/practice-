<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration List</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="registrationStyle.css">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card shadow-lg">
                    <div class="card-header bg-success text-white py-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <h2 class="mb-0"><i class="bi bi-list-check"></i> Registered Users</h2>
                            <a href="registration.html" class="btn btn-light btn-sm"><i class="bi bi-plus-circle"></i> New Registration</a>
                        </div>
                    </div>

                    <div class="card-body">
                        <!-- Statistics -->
                        <div class="alert alert-info">
                            <strong>Total Registrations:</strong> <span id="totalCount" class="badge bg-primary">0</span>
                        </div>

                        <!-- Search -->
                        <div class="mb-3">
                            <input type="text" id="searchInput" class="form-control" placeholder="Search by name or email...">
                        </div>

                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="table table-hover" id="dataTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>#</th>
                                        <th>Full Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Gender</th>
                                        <th>Registered</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr><td colspan="7" class="text-center text-muted py-4">No registrations found</td></tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Clear All Button -->
                        <button class="btn btn-danger mt-3" onclick="clearAll()">Clear All Data</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const STORAGE_KEY = 'registrations';

        // Display registrations table
        function displayTable(filter = '') {
            const registrations = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tableBody = document.getElementById('tableBody');
            const totalCount = document.getElementById('totalCount');

            // Filter
            let filtered = registrations;
            if (filter) {
                filtered = registrations.filter(r =>
                    r.fullName.toLowerCase().includes(filter.toLowerCase()) ||
                    r.email.toLowerCase().includes(filter.toLowerCase())
                );
            }

            totalCount.textContent = registrations.length;

            // Clear table
            tableBody.innerHTML = '';

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No registrations found</td></tr>';
                return;
            }

            // Add rows
            filtered.forEach((reg, index) => {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${reg.fullName}</strong></td>
                        <td>${reg.email}</td>
                        <td>${reg.phone}</td>
                        <td><span class="badge bg-secondary">${reg.gender}</span></td>
                        <td><small>${reg.timestamp}</small></td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteRecord(${reg.id})">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // Delete single record
        function deleteRecord(id) {
            if (confirm('Delete this registration?')) {
                let registrations = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                registrations = registrations.filter(r => r.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(registrations));
                displayTable();
            }
        }

        // Clear all data
        function clearAll() {
            if (confirm('Delete ALL registrations? This cannot be undone!')) {
                localStorage.removeItem(STORAGE_KEY);
                displayTable();
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', function() {
            displayTable(this.value);
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            displayTable();
        });
    </script>
</body>
</html>
