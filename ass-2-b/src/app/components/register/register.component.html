<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
          <div class="d-flex justify-content-between align-items-center">
            <h2 class="mb-0">
              <i class="bi bi-person-plus"></i> User Registration
            </h2>
            <a routerLink="/login" class="btn btn-light btn-sm">
              <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
          </div>
        </div>

        <div class="card-body p-4">
          <!-- Success Alert -->
          <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <strong>Success!</strong> {{ successMessage }}
            <button type="button" class="btn-close" (click)="successMessage = ''"></button>
          </div>

          <!-- Error Alert -->
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <strong>Error!</strong> {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
          </div>

          <!-- Registration Form -->
          <form (ngSubmit)="onSubmit()">
            <!-- Full Name -->
            <div class="mb-3">
              <label for="fullName" class="form-label">
                Full Name <span class="text-danger">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="fullName"
                [(ngModel)]="fullName"
                name="fullName"
                placeholder="Enter your full name"
                required
              />
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">
                Email <span class="text-danger">*</span>
              </label>
              <input
                type="email"
                class="form-control"
                id="email"
                [(ngModel)]="email"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>

            <!-- Phone -->
            <div class="mb-3">
              <label for="phone" class="form-label">
                Phone (10 digits) <span class="text-danger">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="phone"
                [(ngModel)]="phone"
                name="phone"
                placeholder="10-digit phone number"
                required
              />
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label">
                Password <span class="text-danger">*</span>
              </label>
              <input
                type="password"
                class="form-control"
                id="password"
                [(ngModel)]="password"
                name="password"
                placeholder="Min 6 characters"
                required
              />
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">
                Confirm Password <span class="text-danger">*</span>
              </label>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                placeholder="Re-enter password"
                required
              />
            </div>

            <!-- Gender -->
            <div class="mb-3">
              <label class="form-label">
                Gender <span class="text-danger">*</span>
              </label>
              <div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="male"
                    value="Male"
                    [(ngModel)]="gender"
                  />
                  <label class="form-check-label" for="male"> Male </label>
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="female"
                    value="Female"
                    [(ngModel)]="gender"
                  />
                  <label class="form-check-label" for="female"> Female </label>
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="other"
                    value="Other"
                    [(ngModel)]="gender"
                  />
                  <label class="form-check-label" for="other"> Other </label>
                </div>
              </div>
            </div>

            <!-- Address -->
            <div class="mb-3">
              <label for="address" class="form-label">Address</label>
              <textarea
                class="form-control"
                id="address"
                [(ngModel)]="address"
                name="address"
                rows="2"
                placeholder="(Optional)"
              ></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-2">
              <button
                type="submit"
                class="btn btn-primary btn-lg"
                [disabled]="isSubmitting"
              >
                <i class="bi bi-check-circle"></i>
                {{ isSubmitting ? 'Registering...' : 'Register' }}
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="resetForm()">
                Clear
              </button>
            </div>
          </form>

          <!-- Already registered link -->
          <p class="text-center mt-3">
            Already have an account?
            <a routerLink="/login" class="text-primary text-decoration-none">Login here</a>
          </p>
        </div>
      </div>

      <!-- Info -->
      <div class="alert alert-info mt-3" role="alert">
        <i class="bi bi-info-circle"></i> Data is stored securely in your browser's local storage.
      </div>
    </div>
  </div>
</div>
