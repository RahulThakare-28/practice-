<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
          <div class="d-flex justify-content-between align-items-center">
            <h2 class="mb-0">
              <i class="bi bi-box-arrow-in-right"></i> User Login
            </h2>
            <a routerLink="/register" class="btn btn-light btn-sm">
              <i class="bi bi-person-plus"></i> Register
            </a>
          </div>
        </div>

        <div class="card-body p-4">
          <!-- Error Alert -->
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <strong>Login Failed!</strong> {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
          </div>

          <!-- Login Form -->
          <form (ngSubmit)="onSubmit()">
            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">
                Email <span class="text-danger">*</span>
              </label>
              <input
                type="email"
                class="form-control"
                id="email"
                [(ngModel)]="email"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label">
                Password <span class="text-danger">*</span>
              </label>
              <input
                type="password"
                class="form-control"
                id="password"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter your password"
                required
              />
            </div>

            <!-- Remember Me -->
            <div class="mb-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                  [(ngModel)]="rememberMe"
                  name="rememberMe"
                />
                <label class="form-check-label" for="rememberMe">
                  Remember me
                </label>
              </div>
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-2">
              <button
                type="submit"
                class="btn btn-primary btn-lg"
                [disabled]="isSubmitting"
              >
                <i class="bi bi-box-arrow-in-right"></i>
                {{ isSubmitting ? 'Logging in...' : 'Login' }}
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="resetForm()">
                Clear
              </button>
            </div>
          </form>

          <!-- Register link -->
          <p class="text-center mt-3">
            Don't have an account?
            <a routerLink="/register" class="text-primary text-decoration-none">Register here</a>
          </p>

          <!-- Demo Credentials -->
          <div class="alert alert-info mt-3">
            <strong>Demo Account:</strong><br />
            <small>
              Email: <code>demo@example.com</code><br />
              Password: <code>password123</code>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
